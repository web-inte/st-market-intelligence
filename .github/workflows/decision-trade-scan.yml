name: Decision Trade Scanner

on:
  workflow_dispatch:
    inputs:
      round:
        description: "Round 1, 2, or 3"
        required: true
        default: "1"

  schedule:
    # الدورة الأولى: 9:30 ثم كل 15 دقيقة
    - cron: "30,45 9 * * 1-5"
      timezone: "America/New_York"
    - cron: "0,15,30,45 10-15 * * 1-5"
      timezone: "America/New_York"

    # الدورة الثانية: بعد الأولى بخمس دقائق
    - cron: "35,50 9 * * 1-5"
      timezone: "America/New_York"
    - cron: "5,20,35,50 10-15 * * 1-5"
      timezone: "America/New_York"

    # الدورة الثالثة: بعد الثانية بخمس دقائق
    - cron: "40,55 9 * * 1-5"
      timezone: "America/New_York"
    - cron: "10,25,40,55 10-15 * * 1-5"
      timezone: "America/New_York"

permissions:
  contents: read

concurrency:
  group: decision-trade-scanner
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Scan selected round
        env:
          DECISION_SCAN_SECRET: ${{ secrets.DECISION_SCAN_SECRET }}
          BASE_URL: https://www.st-market.com
        shell: bash
        run: |
          set -uo pipefail

          if [ -z "${DECISION_SCAN_SECRET:-}" ]; then
            echo "CRON_SECRET is missing"
            exit 1
          fi

          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            round_number="${{ github.event.inputs.round }}"
          else
            case "${{ github.event.schedule }}" in
              "30,45 9 * * 1-5"|"0,15,30,45 10-15 * * 1-5")
                round_number=1
                ;;
              "35,50 9 * * 1-5"|"5,20,35,50 10-15 * * 1-5")
                round_number=2
                ;;
              "40,55 9 * * 1-5"|"10,25,40,55 10-15 * * 1-5")
                round_number=3
                ;;
              *)
                echo "❌ جدول تشغيل غير معروف"
                exit 1
                ;;
            esac
          fi

          failures=0
          successes=0

          case "${round_number}" in
            1)
              symbols=(
                "AMZN"
                "AAPL"
                "MSFT"
                "QQQ"
                "PLTR"
                "ORCL"
                "COIN"
                "INTC"
                "SMCI"
                "DIS"
                "BA"
                "DDOG"
                "ZS"
                "ANET"
                "RBLX"
                "DECK"
                "BKNG"
                "GE"
                "CMI"
                "VRTX"
                "ABBV"
                "ADSK"
                "CB"
                "CME"
                "MSCI"
                "RSG"
                "FAST"
                "FERG"
                "KLAC"
                "CDNS"
                "MCHP"
                "HCA"
                "HUM"
                "GD"
                "HON"
                "ROK"
                "DHI"
                "LOW"
                "ORLY"
              )
              ;;
            2)
              symbols=(
                "NVDA"
                "META"
                "AVGO"
                "SPY"
                "NFLX"
                "JPM"
                "SHOP"
                "QCOM"
                "SNOW"
                "PYPL"
                "TTD"
                "NET"
                "MDB"
                "APP"
                "TTWO"
                "ONON"
                "DE"
                "ETN"
                "TT"
                "REGN"
                "ISRG"
                "ADP"
                "MMC"
                "SPGI"
                "AON"
                "WM"
                "ODFL"
                "XYL"
                "LRCX"
                "SNPS"
                "FICO"
                "ELV"
                "CNC"
                "LMT"
                "EMR"
                "JCI"
                "PHM"
                "TJX"
                "ROST"
              )
              ;;
            3)
              symbols=(
                "AMD"
                "MSTR"
                "TSLA"
                "GOOGL"
                "CRM"
                "BAC"
                "MU"
                "ARM"
                "UBER"
                "XOM"
                "CRWD"
                "PANW"
                "TEAM"
                "HOOD"
                "EA"
                "ABNB"
                "CAT"
                "PH"
                "LULU"
                "MRK"
                "INTU"
                "PAYX"
                "ICE"
                "MCO"
                "AJG"
                "URI"
                "CPRT"
                "VRT"
                "APH"
                "NXPI"
                "AXON"
                "CI"
                "NOC"
                "RTX"
                "ITW"
                "LEN"
                "NVR"
                "CMG"
                "GWW"
              )
              ;;
            *)
              echo "Invalid round: ${round_number}"
              exit 1
              ;;
          esac

          echo "Round: ${round_number}"
          echo "Symbols: ${#symbols[@]}"

          # المحركان الأول والثاني يعملان على جميع الدوائر دائمًا.
          #
          # محرك قرار البوتات ينتقل بين الدوائر كل 15 دقيقة:
          # دورة 1 → الدائرة الأولى
          # دورة 2 → الدائرة الثانية
          # دورة 3 → الدائرة الثالثة
          #
          # في التشغيل اليدوي، الدائرة المختارة تمر على المحركات الثلاثة.
          if [ "${GITHUB_EVENT_NAME}" = "workflow_dispatch" ]; then
            bot_engine_round="${round_number}"
          else
            cycle_index=$(( $(date +%s) / 900 ))
            bot_engine_round=$(( cycle_index % 3 + 1 ))
          fi

          echo "دائرة محرك قرار البوتات في هذه الدورة: ${bot_engine_round}"

          for symbol in "${symbols[@]}"; do
            echo "===== ${symbol} ====="

            response_file="/tmp/${symbol}.json"

            echo "المحركان الأول والثاني: ${symbol}"

            http_code=$(
              curl \
                --silent \
                --show-error \
                --location \
                --connect-timeout 8 \
                --max-time 240 \
                --output "${response_file}" \
                --write-out "%{http_code}" \
                --header "Authorization: Bearer ${DECISION_SCAN_SECRET}" \
                "${BASE_URL}/api/analysis/${symbol}" \
                || printf "000"
            )

            http_code="${http_code: -3}"

            symbol_failed=0

            if [ "${http_code}" = "200" ]; then
              echo "✅ ${symbol} — المحركان الأول والثاني"
            else
              echo "⚠️ ${symbol} — المحركان الأول والثاني: HTTP ${http_code}"
              head -c 500 "${response_file}" 2>/dev/null || true
              echo
              symbol_failed=1
            fi

            if [ "${round_number}" = "${bot_engine_round}" ]; then
              echo "محرك قرار البوتات: ${symbol}"

              bot_response_file="/tmp/${symbol}-bot-decision.json"

              bot_http_code=$(
                curl \
                  --silent \
                  --show-error \
                  --location \
                  --connect-timeout 8 \
                  --max-time 240 \
                  --output "${bot_response_file}" \
                  --write-out "%{http_code}" \
                  --header "Authorization: Bearer ${DECISION_SCAN_SECRET}" \
                  "${BASE_URL}/api/bot-decision/${symbol}?mode=auto" \
                  || printf "000"
              )

              bot_http_code="${bot_http_code: -3}"

              if [ "${bot_http_code}" = "200" ]; then
                echo "✅ ${symbol} — محرك قرار البوتات"

                python3 - "${bot_response_file}" <<'PYBOT'
                import json
                import sys
                from pathlib import Path

                result_path = Path(sys.argv[1])

                try:
                    data = json.loads(result_path.read_text())
                except Exception as exc:
                    print(f"تعذر قراءة نتيجة محرك البوتات: {exc}")
                else:
                    decision = data.get("decision") or {}
                    watching = data.get("watching") or {}

                    print(
                        "نتيجة القرار:",
                        "مؤهلة" if decision.get("qualifies") else "غير مؤهلة"
                    )

                    if decision.get("side"):
                        print(f"الاتجاه: {decision.get('side')}")

                    if decision.get("score") is not None:
                        print(f"الدرجة: {decision.get('score')} / 10")

                    print(
                        "حالة المراقبة:",
                        watching.get("message", "لا توجد")
                    )
                PYBOT
              else
                echo "⚠️ ${symbol} — محرك قرار البوتات: HTTP ${bot_http_code}"
                head -c 700 "${bot_response_file}" 2>/dev/null || true
                echo
                symbol_failed=1
              fi
            else
              echo "⏭️ ${symbol} — محرك قرار البوتات مخصص لدائرة ${bot_engine_round} في هذه الدورة"
            fi

            if [ "${symbol_failed}" -eq 0 ]; then
              successes=$((successes + 1))
            else
              failures=$((failures + 1))
            fi

            sleep 2
          done

          echo "Successes: ${successes}"
          echo "Failures: ${failures}"

          echo "===== متابعة فرص محرك قرار البوتات ====="

          monitor_file="/tmp/bot-decision-monitor.json"

          monitor_code=$(
            curl \
              --silent \
              --show-error \
              --location \
              --connect-timeout 8 \
              --max-time 240 \
              --output "${monitor_file}" \
              --write-out "%{http_code}" \
              --header "Authorization: Bearer ${DECISION_SCAN_SECRET}" \
              "${BASE_URL}/api/bot-decision/monitor" \
              || printf "000"
          )

          monitor_code="${monitor_code: -3}"

          if [ "${monitor_code}" = "200" ]; then
            echo "✅ تمت متابعة فرص المراقبة"

            python3 - <<'PYMONITOR'
            import json
            from pathlib import Path

            result_path = Path("/tmp/bot-decision-monitor.json")

            try:
                data = json.loads(result_path.read_text())
            except Exception as exc:
                print(f"تعذر قراءة نتيجة المتابعة: {exc}")
            else:
                print(f"تم فحص: {data.get('checked', 0)}")
                print(f"تم تفعيل: {data.get('activated', 0)}")
                print(f"ما زالت تحت المراقبة: {data.get('watching', 0)}")
                print(f"فشل: {data.get('failed', 0)}")
            PYMONITOR
          else
            echo "⚠️ فشل مسار المتابعة: HTTP ${monitor_code}"
            head -c 700 "${monitor_file}" 2>/dev/null || true
            echo
          fi

          if [ "${failures}" -gt 8 ]; then
            exit 1
          fi
