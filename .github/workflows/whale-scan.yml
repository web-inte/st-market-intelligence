name: Whale Scanner

on:
  workflow_dispatch:
  schedule:
    - cron: "30-59/5 11 * * 1-5"
    - cron: "*/5 12-19 * * 1-5"
    - cron: "0-15/5 20 * * 1-5"

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Run whale scanner
        run: |
          curl --fail --silent --show-error --max-time 240 \
            -H "Authorization: Bearer ${{ secrets.WHALE_CRON_SECRET }}" \
            "${{ secrets.WHALE_SCAN_URL }}"
