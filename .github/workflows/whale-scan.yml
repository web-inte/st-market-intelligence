name: Whale Scanner

on:
  schedule:
    - cron: "30-59/5 11 * * 1-5"
    - cron: "*/5 12-19 * * 1-5"
    - cron: "0-15/5 20 * * 1-5"

  workflow_dispatch:

jobs:
  scan:
    runs-on: ubuntu-latest

    steps:
      - name: تشغيل ماسح الحيتان
        run: |
          curl --fail --silent --show-error \
            "${{ secrets.WHALE_SCAN_URL }}"
