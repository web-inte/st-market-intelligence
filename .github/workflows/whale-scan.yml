name: Whale Scanner

on:
  workflow_dispatch:
  schedule:
    - cron: "30-59/5 11 * * 1-5"
    - cron: "*/5 12-19 * * 1-5"
    - cron: "0-15/5 20 * * 1-5"

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Run whale scanner
        run: |
          response_file="$(mktemp)"
          http_code="$(
            curl --silent --show-error --location --max-time 240 \
              --output "${response_file}" \
              --write-out "%{http_code}" \
              -H "Authorization: Bearer ${{ secrets.WHALE_CRON_SECRET }}" \
              "${{ secrets.WHALE_SCAN_URL }}"
          )"

          echo "HTTP_STATUS=${http_code}"
          cat "${response_file}"
          echo

          if [ "${http_code}" -lt 200 ] || [ "${http_code}" -ge 300 ]; then
            exit 1
          fi
